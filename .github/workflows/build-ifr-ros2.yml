name: Build and Push ifr-ros2-base to Tencent Cloud

on:
  push:
    branches: [ "main" ]
    paths:
      - 'docker/ifr-ros2-base/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Tencent Cloud TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.TENCENT_CLOUD_REGISTRY }}
          username: ${{ secrets.TENCENT_CLOUD_USERNAME }}
          password: ${{ secrets.TENCENT_CLOUD_PASSWORD }}

      - name: Generate image tag
        id: vars
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          TIMESTAMP=$(date +'%Y%m%d%H%M%S')
          echo "tag=${SHORT_SHA}-${TIMESTAMP}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker/ifr-ros2-base
          push: true
          tags: |
            ${{ secrets.TENCENT_CLOUD_REGISTRY }}/ws-ifr/ifr-ros2-base:latest
            ${{ secrets.TENCENT_CLOUD_REGISTRY }}/ws-ifr/ifr-ros2-base:${{ steps.vars.outputs.tag }}
